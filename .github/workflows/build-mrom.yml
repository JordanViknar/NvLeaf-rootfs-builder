# .github/workflows/build-mrom.yml
name: Build .mrom package

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  UBUNTU_SUITE: jammy
  TARGET_ARCH: armhf
  ROM_NAME: ubuntu-22.04-xfce
  WIFI_SSID: ""
  WIFI_PASSWORD: ""
  WIFI_HIDDEN: "false"

jobs:
  build-mrom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore apt package cache
        id: apt-cache
        uses: actions/cache@v5
        with:
          path: ./apt-cache
          key: apt-${{ env.UBUNTU_SUITE }}-${{ env.TARGET_ARCH }}-${{ hashFiles('entrypoint.sh') }}
          restore-keys: |
            apt-${{ env.UBUNTU_SUITE }}-${{ env.TARGET_ARCH }}-

      - name: Create apt-cache directory
        run: mkdir -p ./apt-cache

      - name: Create .env file
        run: |
          cat <<- EOF > .env
          UBUNTU_MIRROR=http://ports.ubuntu.com/ubuntu-ports
          UBUNTU_SUITE=${UBUNTU_SUITE}
          TARGET_ARCH=${TARGET_ARCH}
          ROM_NAME=${ROM_NAME}
          WIFI_SSID=${WIFI_SSID}
          WIFI_PASSWORD=${WIFI_PASSWORD}
          WIFI_HIDDEN=${WIFI_HIDDEN}
          EOF

      - name: Build .mrom with Docker Compose
        run: docker compose run --rm builder

      - name: Upload .mrom artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ROM_NAME }}.mrom
          path: ./output/*.mrom
          if-no-files-found: error
          retention-days: 3
